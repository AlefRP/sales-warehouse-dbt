version: 2

sources:
  - name: raw
    description: "Tabelas brutas carregadas via seeds ou ingestão externa."
    schema: raw
    tables:
      - name: customers
        description: "Dados brutos de clientes."
        columns:
          - name: customer_id
            description: "Identificador único do cliente."
            data_tests: [unique, not_null]
          - name: email
            data_tests: [not_null]

      - name: orders
        description: "Dados brutos de pedidos."
        columns:
          - name: order_id
            data_tests: [unique, not_null]
          - name: customer_id
            data_tests:
              - not_null
              - relationships:
                  to: source('raw', 'customers')
                  field: customer_id

      - name: order_items
        description: "Itens de cada pedido (grão: order_id + product_name)."
        columns:
          - name: order_id
            data_tests:
              - not_null
              - relationships:
                  to: source('raw', 'orders')
                  field: order_id

      - name: customer_churn
        description: "Dados brutos de churn de clientes (origem bancária)."
        columns:
          - name: customerid
            data_tests: [unique, not_null]
