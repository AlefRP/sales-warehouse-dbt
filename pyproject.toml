[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "dbt_packages",
    "target",
    "logs",
    "snapshots",
    "macros",
    "models",
    "seeds",
    "analyses",
    "tests",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM"]
ignore = [
    "E501",  # line length handled by formatter
    "B008",  # FastAPI Depends() in defaults is idiomatic
]

[tool.ruff.lint.per-file-ignores]
"orchestrator/tests/*" = ["B011"]

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["orchestrator/tests"]
addopts = "-ra --strict-markers --cov=orchestrator/app --cov-report=term-missing --cov-report=xml"
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.coverage.run]
source = ["orchestrator/app"]
omit = ["orchestrator/tests/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]
